# Delivery pipeline. On push to main: scan -> package -> deploy staging -> deploy
# prod. Staging is automatic; prod waits for the "prod" GitHub Environment's
# required reviewers (manual approval). Credentials come from GitHub OIDC.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"

jobs:
  # ---- Security gate: scan BEFORE any terraform apply ----------------------
  security:
    name: Security scan (pre-deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivy-config: trivy.yaml
          trivyignores: .trivyignore
      - name: Trivy dependency & secret scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ---- Package the Lambda + SBOM + signed build provenance -----------------
  package:
    name: Package Lambda
    runs-on: ubuntu-latest
    needs: security
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - name: Build deterministic zip
        run: |
          mkdir -p dist
          (cd lambda && zip -r -X "../dist/health-check-${GITHUB_SHA}.zip" . -x '*.pyc' '__pycache__/*')
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: lambda
          format: cyclonedx
          output: dist/health-check-sbom.cdx.json
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/health-check-${{ github.sha }}.zip
      - name: Upload artifact + SBOM
        uses: actions/upload-artifact@v4
        with:
          name: lambda-${{ github.sha }}
          path: dist/
          retention-days: 30

  # ---- Staging: automatic ---------------------------------------------------
  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: [security, package]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"
      - name: Select workspace
        run: terraform workspace select staging || terraform workspace new staging
      - name: Plan
        env:
          TF_VAR_permissions_boundary_arn: ${{ vars.PERMISSIONS_BOUNDARY_ARN }}
        run: terraform plan -var-file=staging.tfvars -out=tfplan
      - name: Apply
        run: terraform apply -auto-approve tfplan

  # ---- Production: requires manual approval ---------------------------------
  deploy-prod:
    name: Deploy prod
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod # set Required reviewers on this environment in GitHub
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"
      - name: Select workspace
        run: terraform workspace select prod || terraform workspace new prod
      - name: Plan
        env:
          TF_VAR_permissions_boundary_arn: ${{ vars.PERMISSIONS_BOUNDARY_ARN }}
        run: terraform plan -var-file=prod.tfvars -out=tfplan
      - name: Apply
        run: terraform apply -auto-approve tfplan
